```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ScreenStream Pro</title>
    
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { background-color: #0f172a; color: white; overscroll-behavior-y: contain; }
        
        /* Specialized Video Filters for Screen Reading */
        .filter-normal { filter: none; }
        .filter-grayscale { filter: grayscale(100%); }
        .filter-high-contrast { filter: grayscale(100%) contrast(175%) brightness(95%); }
        /* Anti-moire uses slight blur to break the interference pattern, plus contrast to recover edges */
        .filter-anti-moire { filter: blur(0.6px) contrast(140%) brightness(110%); }
        .filter-invert { filter: invert(100%) hue-rotate(180deg) contrast(120%); }
        
        /* Hide scrollbars but keep functionality */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        video {
            object-fit: contain;
            width: 100%;
            height: 100%;
            max-height: 100vh;
        }

        /* Fullscreen specific tweaks */
        :fullscreen video { object-fit: contain; background: #000; }
        :-webkit-full-screen video { object-fit: contain; background: #000; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- STUN Servers for WebRTC ---
        const rtcConfig = {
            iceServers: [{ urls: ['stun:stun.l.google.com:19302', 'stun:stun1.l.google.com:19302'] }]
        };

        // --- Prevent Accidental Navigation ---
        window.history.pushState(null, null, window.location.href);
        window.onpopstate = function () { window.history.go(1); };
        window.addEventListener('beforeunload', (e) => {
            e.preventDefault();
            e.returnValue = '';
        });

        // --- Wake Lock Hook ---
        const useWakeLock = () => {
            useEffect(() => {
                let wakeLock = null;
                const requestWakeLock = async () => {
                    try {
                        if ('wakeLock' in navigator) {
                            wakeLock = await navigator.wakeLock.request('screen');
                            console.log('Wake Lock active');
                        }
                    } catch (err) {
                        console.warn('Wake Lock failed:', err);
                    }
                };
                requestWakeLock();
                const handleVisibilityChange = () => {
                    if (wakeLock !== null && document.visibilityState === 'visible') {
                        requestWakeLock();
                    }
                };
                document.addEventListener('visibilitychange', handleVisibilityChange);
                return () => {
                    if (wakeLock) wakeLock.release();
                    document.removeEventListener('visibilitychange', handleVisibilityChange);
                };
            }, []);
        };

        // --- Icons ---
        const Icon = ({ name, size = 24, className = '' }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    lucide.createIcons({ icons: { [name]: window.lucide.icons[name] }, nameAttr: 'data-lucide', attrs: { class: className, width: size, height: size } });
                }
            }, [name, size, className]);
            return <i ref={iconRef} data-lucide={name}></i>;
        };

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [supabaseCreds, setSupabaseCreds] = useState({ url: '', key: '' });
            const [isConfigured, setIsConfigured] = useState(false);
            const [role, setRole] = useState(null); // 'host' or 'viewer'

            useEffect(() => {
                const savedUrl = localStorage.getItem('sb_url');
                const savedKey = localStorage.getItem('sb_key');
                if (savedUrl && savedKey) {
                    setSupabaseCreds({ url: savedUrl, key: savedKey });
                    setIsConfigured(true);
                }
            }, []);

            const saveCredentials = (e) => {
                e.preventDefault();
                localStorage.setItem('sb_url', supabaseCreds.url);
                localStorage.setItem('sb_key', supabaseCreds.key);
                setIsConfigured(true);
            };

            const resetCredentials = () => {
                localStorage.removeItem('sb_url');
                localStorage.removeItem('sb_key');
                setIsConfigured(false);
                setRole(null);
            };

            if (!isConfigured) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="bg-slate-800 p-8 rounded-2xl shadow-2xl max-w-md w-full border border-slate-700">
                            <div className="flex justify-center mb-6 text-blue-400">
                                <Icon name="satellite" size={48} />
                            </div>
                            <h1 className="text-2xl font-bold text-center mb-2">ScreenStream Pro</h1>
                            <p className="text-slate-400 text-center mb-6 text-sm">Real-time local WebRTC streaming. No time limits.</p>
                            
                            <form onSubmit={saveCredentials} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-slate-300 mb-1">Supabase Project URL</label>
                                    <input required type="url" value={supabaseCreds.url} onChange={e => setSupabaseCreds({...supabaseCreds, url: e.target.value})} className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="https://xxxx.supabase.co" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-slate-300 mb-1">Supabase Anon Key</label>
                                    <input required type="password" value={supabaseCreds.key} onChange={e => setSupabaseCreds({...supabaseCreds, key: e.target.value})} className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="eyJh..." />
                                </div>
                                <button type="submit" className="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-lg transition duration-200 mt-4 flex justify-center items-center gap-2">
                                    <Icon name="save" size={20} /> Save & Continue
                                </button>
                                <p className="text-xs text-slate-500 text-center mt-4">Credentials are saved securely on this device.</p>
                            </form>
                        </div>
                    </div>
                );
            }

            if (!role) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 flex-col">
                        <div className="absolute top-4 right-4">
                            <button onClick={resetCredentials} className="text-slate-400 hover:text-white p-2 rounded-full bg-slate-800 transition">
                                <Icon name="settings" size={20} />
                            </button>
                        </div>
                        <h2 className="text-3xl font-bold mb-8">Select Device Role</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-2xl">
                            <button onClick={() => setRole('host')} className="group bg-slate-800 hover:bg-slate-700 border border-slate-700 hover:border-blue-500 p-8 rounded-2xl flex flex-col items-center transition duration-300">
                                <div className="bg-blue-900/50 p-4 rounded-full mb-4 group-hover:scale-110 transition">
                                    <Icon name="camera" size={48} className="text-blue-400" />
                                </div>
                                <span className="text-xl font-bold mb-2">Host Camera</span>
                                <span className="text-slate-400 text-center text-sm">Point this device at the computer screen. Streams video.</span>
                            </button>
                            
                            <button onClick={() => setRole('viewer')} className="group bg-slate-800 hover:bg-slate-700 border border-slate-700 hover:border-emerald-500 p-8 rounded-2xl flex flex-col items-center transition duration-300">
                                <div className="bg-emerald-900/50 p-4 rounded-full mb-4 group-hover:scale-110 transition">
                                    <Icon name="monitor-play" size={48} className="text-emerald-400" />
                                </div>
                                <span className="text-xl font-bold mb-2">Viewer</span>
                                <span className="text-slate-400 text-center text-sm">Watch the stream with real-time text/graph filters.</span>
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen w-screen overflow-hidden bg-black">
                    {role === 'host' ? 
                        <HostView creds={supabaseCreds} onExit={() => setRole(null)} /> : 
                        <ViewerView creds={supabaseCreds} onExit={() => setRole(null)} />
                    }
                </div>
            );
        };

        // --- HOST COMPONENT ---
        const HostView = ({ creds, onExit }) => {
            useWakeLock();
            const videoRef = useRef(null);
            const [supabase, setSupabase] = useState(null);
            const [channel, setChannel] = useState(null);
            const [stream, setStream] = useState(null);
            const [viewers, setViewers] = useState(0);
            const [capabilities, setCapabilities] = useState({});
            
            // WebRTC peer connections mapped by viewer ID
            const peersRef = useRef({}); 

            // Initialize Camera & Supabase
            useEffect(() => {
                const sb = window.supabase.createClient(creds.url, creds.key);
                setSupabase(sb);

                const startCamera = async () => {
                    try {
                        const mediaStream = await navigator.mediaDevices.getUserMedia({
                            video: { 
                                facingMode: 'environment',
                                width: { ideal: 1920 },
                                height: { ideal: 1080 },
                                advanced: [{ focusMode: "continuous" }] 
                            },
                            audio: false
                        });
                        
                        if (videoRef.current) {
                            videoRef.current.srcObject = mediaStream;
                        }
                        setStream(mediaStream);

                        // Extract capabilities for Macro/Zoom UI if available
                        const track = mediaStream.getVideoTracks()[0];
                        if (track.getCapabilities) {
                            setCapabilities(track.getCapabilities());
                        }

                    } catch (err) {
                        alert("Camera error: " + err.message);
                    }
                };
                startCamera();

                return () => {
                    if (stream) stream.getTracks().forEach(t => t.stop());
                    Object.values(peersRef.current).forEach(pc => pc.close());
                };
            }, []);

            // Setup Signaling
            useEffect(() => {
                if (!supabase || !stream) return;

                const chan = supabase.channel('webrtc-stream');
                
                chan.on('broadcast', { event: 'viewer_join' }, async ({ payload }) => {
                    const viewerId = payload.viewerId;
                    console.log("Viewer joined:", viewerId);
                    
                    // Create new PeerConnection for this viewer
                    const pc = new RTCPeerConnection(rtcConfig);
                    peersRef.current[viewerId] = pc;

                    // Add local stream tracks
                    stream.getTracks().forEach(track => pc.addTrack(track, stream));

                    // ICE Candidates
                    pc.onicecandidate = (event) => {
                        if (event.candidate) {
                            chan.send({
                                type: 'broadcast',
                                event: 'ice_candidate',
                                payload: { target: viewerId, sender: 'host', candidate: event.candidate }
                            });
                        }
                    };

                    pc.onconnectionstatechange = () => {
                        const activeViewers = Object.values(peersRef.current).filter(p => p.connectionState === 'connected').length;
                        setViewers(activeViewers);
                    };

                    // Create Offer
                    const offer = await pc.createOffer();
                    await pc.setLocalDescription(offer);
                    
                    chan.send({
                        type: 'broadcast',
                        event: 'offer',
                        payload: { target: viewerId, sdp: offer }
                    });
                });

                chan.on('broadcast', { event: 'answer' }, async ({ payload }) => {
                    const pc = peersRef.current[payload.sender];
                    if (pc && payload.target === 'host') {
                        await pc.setRemoteDescription(new RTCSessionDescription(payload.sdp));
                    }
                });

                chan.on('broadcast', { event: 'ice_candidate' }, async ({ payload }) => {
                    const pc = peersRef.current[payload.sender];
                    if (pc && payload.target === 'host') {
                        await pc.addIceCandidate(new RTCIceCandidate(payload.candidate));
                    }
                });

                chan.subscribe(async (status) => {
                    if (status === 'SUBSCRIBED') {
                        setChannel(chan);
                        // Announce host is alive
                        chan.send({ type: 'broadcast', event: 'host_alive', payload: {} });
                    }
                });

                return () => { chan.unsubscribe(); };
            }, [supabase, stream]);

            // Camera Controls
            const handleZoom = (e) => {
                if(!stream) return;
                const track = stream.getVideoTracks()[0];
                track.applyConstraints({ advanced: [{ zoom: parseFloat(e.target.value) }] });
            };

            return (
                <div className="relative w-full h-full bg-black">
                    <video ref={videoRef} autoPlay playsInline muted className="w-full h-full object-cover"></video>
                    
                    <div className="absolute top-0 left-0 right-0 p-4 bg-gradient-to-b from-black/80 to-transparent flex justify-between items-start z-10">
                        <div>
                            <span className="bg-red-600 text-white text-xs font-bold px-3 py-1 rounded-full animate-pulse flex items-center gap-2 inline-flex">
                                <div className="w-2 h-2 bg-white rounded-full"></div> LIVE HOST
                            </span>
                            <div className="text-slate-300 text-sm mt-2 flex items-center gap-1">
                                <Icon name="users" size={16} /> {viewers} Viewer(s) connected
                            </div>
                        </div>
                        <button onClick={onExit} className="bg-slate-800/80 p-3 rounded-full text-white hover:bg-slate-700 backdrop-blur">
                            <Icon name="x" size={20} />
                        </button>
                    </div>

                    <div className="absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-black/90 to-transparent z-10 pb-10">
                        <div className="max-w-md mx-auto space-y-4">
                            <div className="text-center text-sm text-slate-300 font-medium mb-2">Camera Controls</div>
                            
                            {capabilities.zoom && (
                                <div className="flex items-center gap-4 bg-slate-800/60 p-4 rounded-xl backdrop-blur">
                                    <Icon name="zoom-out" size={20} className="text-slate-400" />
                                    <input type="range" min={capabilities.zoom.min} max={capabilities.zoom.max} step={capabilities.zoom.step} defaultValue={capabilities.zoom.min} onChange={handleZoom} className="w-full accent-blue-500" />
                                    <Icon name="zoom-in" size={20} className="text-slate-400" />
                                </div>
                            )}

                            <div className="grid grid-cols-2 gap-3">
                                <button className="bg-slate-800/80 py-3 rounded-xl border border-slate-600 text-sm flex items-center justify-center gap-2" onClick={() => {
                                    if(stream) {
                                        const t = stream.getVideoTracks()[0];
                                        t.applyConstraints({ advanced: [{ focusMode: 'continuous' }]}).catch(()=>{});
                                    }
                                }}>
                                    <Icon name="scan-line" size={16} /> Auto Focus
                                </button>
                                <button className="bg-slate-800/80 py-3 rounded-xl border border-slate-600 text-sm flex items-center justify-center gap-2" onClick={() => {
                                    if(stream) {
                                        const t = stream.getVideoTracks()[0];
                                        t.applyConstraints({ advanced: [{ focusMode: 'macro' }]}).catch(()=>alert("Macro not supported on this device"));
                                    }
                                }}>
                                    <Icon name="search" size={16} /> Macro Mode
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- VIEWER COMPONENT ---
        const ViewerView = ({ creds, onExit }) => {
            useWakeLock();
            const videoRef = useRef(null);
            const containerRef = useRef(null);
            const [supabase, setSupabase] = useState(null);
            const [viewerId] = useState(() => Math.random().toString(36).substring(2, 15));
            const [isConnected, setIsConnected] = useState(false);
            const [filter, setFilter] = useState('filter-normal');
            const [isFullscreen, setIsFullscreen] = useState(false);
            const [controlsVisible, setControlsVisible] = useState(true);
            const pcRef = useRef(null);
            const controlsTimeoutRef = useRef(null);

            // Hide controls automatically
            const resetControlsTimeout = useCallback(() => {
                setControlsVisible(true);
                if (controlsTimeoutRef.current) clearTimeout(controlsTimeoutRef.current);
                controlsTimeoutRef.current = setTimeout(() => {
                    setControlsVisible(false);
                }, 4000);
            }, []);

            useEffect(() => {
                document.addEventListener('mousemove', resetControlsTimeout);
                document.addEventListener('touchstart', resetControlsTimeout);
                resetControlsTimeout();
                return () => {
                    document.removeEventListener('mousemove', resetControlsTimeout);
                    document.removeEventListener('touchstart', resetControlsTimeout);
                    if (controlsTimeoutRef.current) clearTimeout(controlsTimeoutRef.current);
                };
            }, [resetControlsTimeout]);

            useEffect(() => {
                const handleFullscreenChange = () => {
                    setIsFullscreen(!!document.fullscreenElement);
                };
                document.addEventListener('fullscreenchange', handleFullscreenChange);
                return () => document.removeEventListener('fullscreenchange', handleFullscreenChange);
            }, []);

            const toggleFullscreen = async () => {
                if (!document.fullscreenElement) {
                    if (containerRef.current.requestFullscreen) {
                        await containerRef.current.requestFullscreen();
                    } else if (containerRef.current.webkitRequestFullscreen) {
                        await containerRef.current.webkitRequestFullscreen(); // iOS Safari
                    }
                } else {
                    if (document.exitFullscreen) {
                        await document.exitFullscreen();
                    }
                }
            };

            // Setup WebRTC and Signaling
            useEffect(() => {
                const sb = window.supabase.createClient(creds.url, creds.key);
                setSupabase(sb);

                const pc = new RTCPeerConnection(rtcConfig);
                pcRef.current = pc;

                pc.ontrack = (event) => {
                    if (videoRef.current) {
                        videoRef.current.srcObject = event.streams[0];
                    }
                };

                pc.onconnectionstatechange = () => {
                    setIsConnected(pc.connectionState === 'connected');
                };

                const chan = sb.channel('webrtc-stream');

                pc.onicecandidate = (event) => {
                    if (event.candidate) {
                        chan.send({
                            type: 'broadcast',
                            event: 'ice_candidate',
                            payload: { target: 'host', sender: viewerId, candidate: event.candidate }
                        });
                    }
                };

                chan.on('broadcast', { event: 'host_alive' }, () => {
                    // Host is there, request to join
                    chan.send({ type: 'broadcast', event: 'viewer_join', payload: { viewerId } });
                });

                chan.on('broadcast', { event: 'offer' }, async ({ payload }) => {
                    if (payload.target === viewerId) {
                        await pc.setRemoteDescription(new RTCSessionDescription(payload.sdp));
                        const answer = await pc.createAnswer();
                        await pc.setLocalDescription(answer);
                        
                        chan.send({
                            type: 'broadcast',
                            event: 'answer',
                            payload: { target: 'host', sender: viewerId, sdp: answer }
                        });
                    }
                });

                chan.on('broadcast', { event: 'ice_candidate' }, async ({ payload }) => {
                    if (payload.target === viewerId) {
                        await pc.addIceCandidate(new RTCIceCandidate(payload.candidate));
                    }
                });

                chan.subscribe((status) => {
                    if (status === 'SUBSCRIBED') {
                        // Notify host immediately upon subscribing
                        chan.send({ type: 'broadcast', event: 'viewer_join', payload: { viewerId } });
                    }
                });

                return () => {
                    pc.close();
                    chan.unsubscribe();
                };
            }, []);

            const filters = [
                { id: 'filter-normal', name: 'Normal', icon: 'image' },
                { id: 'filter-anti-moire', name: 'Anti-Moiré', icon: 'grid' },
                { id: 'filter-high-contrast', name: 'Text Enhance', icon: 'type' },
                { id: 'filter-grayscale', name: 'B&W', icon: 'droplet' },
                { id: 'filter-invert', name: 'Invert', icon: 'sun-moon' },
            ];

            return (
                <div ref={containerRef} className="relative w-full h-full bg-black flex flex-col items-center justify-center">
                    
                    {!isConnected && (
                        <div className="absolute inset-0 flex flex-col items-center justify-center z-20 bg-black/90">
                            <Icon name="loader" size={48} className="text-blue-500 animate-spin mb-4" />
                            <p className="text-slate-300">Connecting to Host Camera...</p>
                            <p className="text-xs text-slate-500 mt-2">Make sure the host device is active</p>
                        </div>
                    )}

                    <video 
                        ref={videoRef} 
                        autoPlay 
                        playsInline 
                        className={`w-full h-full transition-all duration-300 ${filter}`}
                    ></video>

                    {/* Top UI Bar */}
                    <div className={`absolute top-0 left-0 right-0 p-4 bg-gradient-to-b from-black/80 to-transparent flex justify-between items-start z-30 transition-opacity duration-300 ${controlsVisible ? 'opacity-100' : 'opacity-0'}`}>
                        <div className="flex items-center gap-3">
                            <span className="bg-slate-800 border border-slate-600 text-white text-xs px-3 py-1.5 rounded-full flex items-center gap-2 shadow-lg">
                                <div className={`w-2 h-2 rounded-full ${isConnected ? 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.8)]' : 'bg-orange-500'}`}></div> 
                                {isConnected ? 'CONNECTED' : 'WAITING'}
                            </span>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={toggleFullscreen} className="bg-slate-800/80 p-2.5 rounded-full text-white hover:bg-slate-700 backdrop-blur shadow-lg">
                                <Icon name={isFullscreen ? "minimize" : "maximize"} size={20} />
                            </button>
                            <button onClick={onExit} className="bg-red-600/80 p-2.5 rounded-full text-white hover:bg-red-500 backdrop-blur shadow-lg">
                                <Icon name="x" size={20} />
                            </button>
                        </div>
                    </div>

                    {/* Bottom Filters UI */}
                    <div className={`absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-black/90 to-transparent z-30 transition-opacity duration-300 ${controlsVisible ? 'opacity-100' : 'opacity-0'} pb-10`}>
                        <div className="w-full max-w-2xl mx-auto">
                            <div className="text-xs text-slate-400 font-semibold uppercase tracking-wider mb-3 px-2">Live Screen Filters</div>
                            <div className="flex gap-3 overflow-x-auto pb-4 snap-x hide-scrollbar" style={{ scrollbarWidth: 'none' }}>
                                {filters.map(f => (
                                    <button 
                                        key={f.id}
                                        onClick={() => setFilter(f.id)}
                                        className={`snap-center shrink-0 flex flex-col items-center gap-2 p-3 rounded-xl border min-w-[90px] transition-all
                                            ${filter === f.id 
                                                ? 'bg-blue-600 border-blue-400 text-white shadow-[0_0_15px_rgba(37,99,235,0.4)]' 
                                                : 'bg-slate-800/80 border-slate-700 text-slate-400 hover:bg-slate-700 backdrop-blur'
                                            }`}
                                    >
                                        <Icon name={f.icon} size={24} />
                                        <span className="text-xs font-medium">{f.name}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

```
